<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegoControl</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#594ae2" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LegoControl.UI.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <style>
            #loading-screen {
                position: fixed;
                inset: 0;
                background: linear-gradient(135deg, #0f0f1a 0%, #16213e 60%, #1a1a2e 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                color: white;
                overflow: hidden;
            }

            #loading-screen::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image: radial-gradient(circle, rgba(89, 74, 226, 0.09) 1px, transparent 1px);
                background-size: 32px 32px;
                pointer-events: none;
            }

            .ll-logo {
                width: 96px;
                height: 96px;
                animation: ll-bounce 2.4s ease-in-out infinite;
                filter: drop-shadow(0 12px 32px rgba(230, 57, 70, 0.45));
                position: relative;
                z-index: 1;
            }

            @keyframes ll-bounce {
                0%, 100% { transform: translateY(0) scale(1); }
                50% { transform: translateY(-12px) scale(1.04); }
            }

            .ll-title {
                font-size: 2.2rem;
                font-weight: 800;
                letter-spacing: 3px;
                margin: 28px 0 6px;
                background: linear-gradient(90deg, #ff6b6b, #e63946, #7c6ff7, #594ae2, #ff6b6b);
                background-size: 300% auto;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: ll-shimmer 4s linear infinite;
                position: relative;
                z-index: 1;
            }

            @keyframes ll-shimmer {
                0%   { background-position: 0% center; }
                100% { background-position: 300% center; }
            }

            .ll-subtitle {
                font-size: 0.72rem;
                color: rgba(255, 255, 255, 0.35);
                letter-spacing: 5px;
                text-transform: uppercase;
                margin-bottom: 52px;
                position: relative;
                z-index: 1;
            }

            .ll-dots {
                display: flex;
                gap: 10px;
                position: relative;
                z-index: 1;
            }

            .ll-dot {
                width: 11px;
                height: 11px;
                border-radius: 50%;
                animation: ll-dot-pulse 1.5s ease-in-out infinite;
            }

            .ll-dot:nth-child(1) { background: #e63946; animation-delay: 0s; }
            .ll-dot:nth-child(2) { background: #594ae2; animation-delay: 0.22s; }
            .ll-dot:nth-child(3) { background: #ff8fa3; animation-delay: 0.44s; }

            @keyframes ll-dot-pulse {
                0%, 80%, 100% { transform: scale(0.55); opacity: 0.4; }
                40%           { transform: scale(1.1);  opacity: 1; }
            }

            .ll-bar-track {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: rgba(255, 255, 255, 0.04);
            }

            .ll-bar {
                height: 100%;
                width: 40%;
                background: linear-gradient(90deg, transparent, #e63946, #594ae2, transparent);
                animation: ll-bar-slide 2.2s ease-in-out infinite;
            }

            @keyframes ll-bar-slide {
                0%   { transform: translateX(-100%); }
                100% { transform: translateX(350%); }
            }

            .ll-glow {
                position: absolute;
                width: 400px;
                height: 400px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(89, 74, 226, 0.12) 0%, transparent 70%);
                animation: ll-glow-pulse 3s ease-in-out infinite;
                pointer-events: none;
            }

            @keyframes ll-glow-pulse {
                0%, 100% { opacity: 0.6; transform: scale(1); }
                50%       { opacity: 1;   transform: scale(1.15); }
            }
        </style>

        <div id="loading-screen">
            <div class="ll-glow"></div>

            <svg class="ll-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                <rect width="32" height="32" rx="6" fill="#16213e"/>
                <rect x="5" y="9" width="8" height="7" fill="#e63946"/>
                <ellipse cx="9" cy="9" rx="4" ry="2.3" fill="#ff6b6b"/>
                <rect x="19" y="9" width="8" height="7" fill="#e63946"/>
                <ellipse cx="23" cy="9" rx="4" ry="2.3" fill="#ff6b6b"/>
                <rect x="3" y="14" width="26" height="13" rx="2" fill="#e63946"/>
                <rect x="3" y="23" width="26" height="4" rx="2" fill="#c1121f"/>
                <rect x="3" y="14" width="26" height="2.5" rx="1" fill="#ff8fa3" opacity="0.5"/>
            </svg>

            <div class="ll-title">LegoControl</div>
            <div class="ll-subtitle">Bluetooth Controller</div>

            <div class="ll-dots">
                <div class="ll-dot"></div>
                <div class="ll-dot"></div>
                <div class="ll-dot"></div>
            </div>

            <div class="ll-bar-track">
                <div class="ll-bar"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        window.downloadJson = function (filename, content) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
    <script src="js/lib/blockly_compressed.js"></script>
    <script src="js/lib/blocks_compressed.js"></script>
    <script src="js/lib/blockly-msg-en.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
